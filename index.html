<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Yasna ❤️</title>
    <style>
        /* Modern Gradient Background */
        body { 
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 50%, #fce4ec 100%);
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        h2 { color: #5c6bc0; font-size: 1.2rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        h1 { color: #d81b60; font-size: 2.5rem; margin-top: 0; }

        .buttons { 
            margin-top: 30px; 
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 100px; 
        }

        button { 
            padding: 15px 35px; 
            font-size: 1.1rem; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yesBtn { background-color: #43a047; color: white; }
        #yesBtn:hover { transform: scale(1.1); background-color: #388e3c; }

        #noBtn { 
            background-color: #e53935; 
            color: white; 
            position: absolute; 
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>To my beautiful Yasna</h2>
        <h1>Will you be my Valentine? ❤️</h1>

        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">Yes, I will!</button>
            <button id="noBtn" onmouseover="moveButton()" onclick="tryAgain()">No, I will not</button>
        </div>
    </div>

    <script>
        function moveButton() {
            // This makes the button jump to a random spot within the screen
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 50);
            const noBtn = document.getElementById('noBtn');
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function tryAgain() {
            alert("Nice try, Yasna! But 'No' is not an option today. 😉");
        }

        function celebrate() {
            document.body.innerHTML = 
                <div style="text-align:center;">
                    <h1 style="font-size: 4rem;">💖🎉🌹</h1>
                    <h1 style="color: #d81b60;">I knew you'd say YES, Yasna!</h1>
                    <p style="font-size: 1.5rem; color: #5c6bc0;">You've made me the luckiest person alive. Happy Valentine's Day!</p>
                </div>
            ;
            document.body.style.background = "linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%)";
        }
    </script>
</body>
</html>
