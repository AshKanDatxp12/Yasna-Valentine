<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Yasna 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Quicksand', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #d8c8ff, #c7e7ff);
        overflow: hidden;
        transition: filter 0.5s ease;
    }

    .container {
        text-align: center;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1.2s ease, transform 1.2s ease;
    }

    .container.show {
        opacity: 1;
        transform: translateY(0);
    }

    h1 {
        font-family: 'Pacifico', cursive;
        font-size: 28px;
        color: #6a1b9a;
        margin-bottom: 40px;
        padding: 0 20px;
    }

    .buttons {
        display: flex;
        gap: 25px;
        justify-content: center;
        flex-wrap: wrap;
    }

    button {
        padding: 15px 35px;
        border: none;
        border-radius: 50px;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #yesBtn {
        background-color: #ff6f91;
        color: white;
        box-shadow: 0 4px 15px rgba(255, 105, 135, 0.4);
    }

    #noBtn {
        background-color: #b39ddb;
        color: white;
        box-shadow: 0 4px 15px rgba(179, 157, 219, 0.4);
    }

    button:hover {
        transform: scale(1.05);
    }

    /* Popup image */
    .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        z-index: 10;
        transition: transform 0.5s ease;
    }

    .popup img {
        max-width: 90vw;
        max-height: 80vh;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .popup.show {
        transform: translate(-50%, -50%) scale(1);
    }

    .blur {
        filter: blur(8px);
    }
</style>
</head>

<body>

<div class="container" id="mainContent">
    <h1>
        My darling Yasna,<br><br>
        Would you be my Valentine,<br>
        would you be my first and last Valentine of my life?
    </h1>

    <div class="buttons">
        <button id="yesBtn">Yes, I will 🤍</button>
        <button id="noBtn">No, I will not 😢</button>
    </div>
</div>

<div class="popup" id="popup">
    <img src="your-image.jpg" alt="Special Image">
</div>

<audio id="bgMusic" autoplay loop>
    <source src="your-music.mp3" type="audio/mpeg">
</audio>

<script>
    const container = document.getElementById("mainContent");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const popup = document.getElementById("popup");
    const body = document.body;
    const music = document.getElementById("bgMusic");

    let noClicks = 0;
    let yesScale = 1;

    // Fade in after short delay
    setTimeout(() => {
        container.classList.add("show");
    }, 600);

    // Lower music volume
    music.volume = 0.08;

    noBtn.addEventListener("click", () => {
        noClicks++;
        yesScale += 0.3;
        yesBtn.style.transform = `scale(${yesScale})`;

        if (noClicks >= 3) {
            popup.classList.add("show");
            container.classList.add("blur");

            setTimeout(() => {
                popup.classList.remove("show");
                container.classList.remove("blur");
                noClicks = 0;
                yesScale = 1;
                yesBtn.style.transform = "scale(1)";
            }, 3000);
        }
    });

    yesBtn.addEventListener("click", () => {
        alert("You just made me the happiest man alive 💜");
    });
</script>

</body>
</html>
